name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: .hermes-agent
      - uses: astral-sh/setup-uv@v6
      - run: uv run --no-project --python ${{ matrix.python }} --with pytest --with pyyaml --with rich pytest -q
        env:
          HERMES_AGENT_SRC: ${{ github.workspace }}/.hermes-agent

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: .hermes-agent
      - uses: astral-sh/setup-uv@v6
      - run: uvx ruff check .
      - run: uvx ruff format --check .
      - name: Type-check plugin through a valid module name
        shell: bash
        run: |
          typecheck_dir="$(mktemp -d)"
          trap 'rm -rf "$typecheck_dir"' EXIT
          cp proton-pass/__init__.py "$typecheck_dir/proton_pass.py"
          MYPYPATH="$GITHUB_WORKSPACE/.hermes-agent" \
            PYTHONPATH="$GITHUB_WORKSPACE/.hermes-agent" \
            uvx mypy --follow-imports=silent --ignore-missing-imports \
              "$typecheck_dir/proton_pass.py"
      - run: git diff --check
      - run: uv run --no-project --python 3.13 --with pytest --with pyyaml --with rich pytest tests/test_install_smoke.py -q
        env:
          HERMES_AGENT_SRC: ${{ github.workspace }}/.hermes-agent
